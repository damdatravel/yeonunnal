<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여는날 — 협력사 로그인</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1610;
    --paper: #faf8f4;
    --cream: #f2ede4;
    --gold: #c8a96e;
    --gold-light: #e8d5a8;
    --muted: #8a7d6a;
    --line: #e0d8cc;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }
  header {
    background: var(--ink);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-family: 'Noto Serif KR', serif; font-size: 20px; color: var(--gold); letter-spacing: 0.08em; text-decoration:none; }
  .home-link { color: var(--muted); font-size: 13px; text-decoration: none; display:flex; align-items:center; gap:6px; }
  .home-link:hover { color: var(--gold); }

  main { max-width: 420px; margin: 0 auto; padding: 56px 24px 80px; }

  .tabs { display: flex; gap: 0; margin-bottom: 32px; border-bottom: 1px solid var(--line); }
  .tab-btn {
    flex: 1; text-align: center; padding: 14px 0; font-size: 14px; color: var(--muted);
    border-bottom: 2px solid transparent; cursor: pointer; background: none; border-top:none; border-left:none; border-right:none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tab-btn.active { color: var(--ink); border-bottom-color: var(--gold); font-weight: 500; }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .page-title { font-family:'Noto Serif KR', serif; font-size: 24px; margin-bottom: 8px; }
  .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

  .form-group { margin-bottom: 16px; }
  .form-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; letter-spacing:0.05em; }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; border:1.5px solid var(--line); border-radius:8px; padding:12px 14px;
    font-size:14px; font-family:'Noto Sans KR', sans-serif; font-weight:300; background:var(--white);
    color:var(--ink); outline:none; transition:border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
  .form-group textarea { resize:none; height:80px; }

  .btn-submit {
    width:100%; background:var(--gold); color:var(--white); border:none; border-radius:8px;
    padding:14px; font-size:15px; font-weight:500; cursor:pointer; margin-top:8px;
    font-family:'Noto Sans KR', sans-serif; transition: background 0.2s;
  }
  .btn-submit:hover { background:#b8945a; }

  .helper-link { display:block; text-align:center; font-size:12px; color:var(--muted); margin-top:16px; text-decoration:none; }
  .helper-link:hover { color: var(--gold); }

  .notice-box {
    background: var(--cream); border-radius: 10px; padding: 14px 16px;
    font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 24px;
  }
  .notice-box strong { color: var(--ink); font-weight:500; }

  /* SOCIAL LOGIN */
  .social-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .social-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 13px; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: 1.5px solid var(--line); transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .social-btn:hover { transform: translateY(-1px); }
  .social-btn.kakao { background: #FEE500; color: #3A1D1D; border-color: #FEE500; }
  .social-btn.google { background: var(--white); color: var(--ink); }
  .social-btn.naver { background: #03C75A; color: var(--white); border-color: #03C75A; }
  .social-icon { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }
  .divider span { font-size: 12px; color: var(--muted); }

  .login-status {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--cream); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
    font-size: 13px; color: var(--ink);
  }
  .login-status button {
    background: none; border: none; color: var(--muted); font-size: 12px;
    text-decoration: underline; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }

  /* ── 카카오톡 플로팅 버튼 ── */
  .kakao-float {
    position: fixed;
    right: 20px;
    bottom: 24px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .kakao-float__tooltip {
    background: #2a2218;
    color: #f5f0e8;
    border: 1px solid #c8a96e55;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    opacity: 0;
    transform: translateX(8px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
  }

  .kakao-float:hover .kakao-float__tooltip,
  .kakao-float.show-tip .kakao-float__tooltip {
    opacity: 1;
    transform: translateX(0);
  }

  .kakao-float__btn {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: #FEE500;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4), 0 0 0 0 rgba(254,229,0,0.5);
    text-decoration: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: kakao-pulse 2.6s ease-out 1;
  }

  .kakao-float__btn:hover {
    transform: scale(1.08);
  }

  .kakao-float__btn svg {
    width: 30px;
    height: 30px;
  }

  @keyframes kakao-pulse {
    0%   { box-shadow: 0 6px 20px rgba(0,0,0,0.4), 0 0 0 0 rgba(254,229,0,0.55); }
    70%  { box-shadow: 0 6px 20px rgba(0,0,0,0.4), 0 0 0 16px rgba(254,229,0,0); }
    100% { box-shadow: 0 6px 20px rgba(0,0,0,0.4), 0 0 0 0 rgba(254,229,0,0); }
  }

  @media (max-width: 480px) {
    .kakao-float__tooltip { display: none; }
    .kakao-float { right: 16px; bottom: 16px; }
    .kakao-float__btn { width: 52px; height: 52px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .kakao-float__btn { animation: none; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<header>
  <a href="index.html" class="logo">여는날</a>
  <a href="index.html" class="home-link">← 홈으로</a>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="showPanel('login')">로그인</button>
    <button class="tab-btn" id="tab-apply" onclick="showPanel('apply')">협력 신청</button>
  </div>

  <!-- LOGIN -->
  <div class="panel active" id="panel-login">
    <div class="page-title">협력사 로그인</div>
    <div class="page-sub">간편 로그인으로 빠르게 시작하세요<br>정산 내역과 신청 현황을 확인할 수 있어요</div>

    <div class="social-list">
      <button class="social-btn kakao" onclick="socialLogin('kakao')">
        <span class="social-icon">💬</span> 카카오로 로그인
      </button>
      <button class="social-btn google" onclick="socialLogin('google')">
        <span class="social-icon">G</span> 구글로 로그인
      </button>
      <button class="social-btn naver" style="opacity:0.5;cursor:not-allowed;" onclick="alert('네이버 로그인은 현재 점검 중입니다. 카카오 또는 구글 로그인을 이용해주세요.')">
        <span class="social-icon">N</span> 네이버로 로그인 (준비 중)
      </button>
    </div>

    <div class="divider"><span>또는</span></div>

    <div class="form-group">
      <label>아이디 (이메일)</label>
      <input type="email" placeholder="partner@example.com">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" placeholder="비밀번호 입력">
    </div>
    <button class="btn-submit" onclick="alert('이메일 로그인 기능은 준비 중입니다. 소셜 로그인을 이용해주세요.')">로그인</button>
    <a href="#" class="helper-link" onclick="showPanel('apply'); return false;">아직 협력사가 아니신가요? 협력 신청하기 →</a>
  </div>

  <!-- APPLY -->
  <div class="panel" id="panel-apply">
    <div class="page-title">협력 신청</div>
    <div class="page-sub">플로리스트, 스냅·영상, 헤어메이크업, 푸드트럭, 답례품 등<br>여는날과 함께할 협력사를 찾고 있어요</div>

    <div id="apply-login-status"></div>

    <div class="notice-box">
      <strong>안내</strong><br>
      신청서 검토 후 영업일 기준 2~3일 내 카카오채널로 연락드려요
    </div>

    <div class="form-group">
      <label>업체명</label>
      <input type="text" id="ap-company" placeholder="업체명을 입력해주세요">
    </div>
    <div class="form-group">
      <label>담당자 이름</label>
      <input type="text" id="ap-name" placeholder="이름을 입력해주세요">
    </div>
    <div class="form-group">
      <label>연락처</label>
      <input type="tel" id="ap-phone" placeholder="010-0000-0000">
    </div>
    <div class="form-group">
      <label>협력 분야</label>
      <select id="ap-category">
        <option value="">선택해주세요</option>
        <option>플로리스트 · 꽃장식</option>
        <option>스냅 · 영상 촬영</option>
        <option>헤어 · 메이크업</option>
        <option>푸드트럭 · 음료바</option>
        <option>답례품</option>
        <option>버스킹 · 음악</option>
        <option>기타</option>
      </select>
    </div>
    <div class="form-group">
      <label>소개 / 포트폴리오 링크 (선택)</label>
      <textarea id="ap-intro" placeholder="간단한 소개나 인스타그램, 포트폴리오 링크를 남겨주세요"></textarea>
    </div>
    <button class="btn-submit" id="ap-submit-btn" onclick="submitApplication()">신청서 제출</button>
  </div>
</main>

<div class="kakao-float" id="kakaoFloat">
  <div class="kakao-float__tooltip">카카오톡으로 상담하기</div>
  <a class="kakao-float__btn"
     href="http://pf.kakao.com/_XExfXX/chat"
     target="_blank"
     rel="noopener"
     aria-label="카카오톡 채널 상담하기">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 3C6.477 3 2 6.58 2 11c0 2.86 1.86 5.37 4.65 6.8-.2.74-.73 2.7-.84 3.12-.13.52.19.51.4.37.17-.11 2.7-1.83 3.8-2.58.63.09 1.28.14 1.99.14 5.523 0 10-3.58 10-8s-4.477-8-10-8z"
        fill="#1a1610"/>
    </svg>
  </a>
</div>

<script>
  window.addEventListener('load', () => {
    const el = document.getElementById('kakaoFloat');
    setTimeout(() => el.classList.add('show-tip'), 1500);
    setTimeout(() => el.classList.remove('show-tip'), 5500);
  });
</script>

<script>
  // Supabase 초기화
  const SUPABASE_URL = 'https://ntldrtnpewfvechqxjzj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_rmTxWljULBYeHVnswvJkKw_FaJ6KNXB';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 구글시트 연동 (Apps Script 웹앱)
  const SHEET_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbzG1GPR8OhMIeBeTFvt7gE5CGiyQx3ggnLiVIah9geT89m-_poYFEwmi9K--NZ0HxDKjg/exec';

  let loggedInProvider = '';
  let loggedInEmail = '';

  function showPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  async function socialLogin(provider) {
    // 카카오·구글은 기본 제공자, 네이버는 Custom Provider(custom:naver)
    const providerName = provider === 'naver' ? 'custom:naver' : provider;
    const opts = { redirectTo: window.location.origin + '/partner.html' };
    // 카카오 비즈 앱 전환 완료 — 닉네임/프로필/이메일 동의항목 요청
    if (provider === 'kakao') opts.scopes = 'profile_nickname profile_image account_email';
    const { error } = await sb.auth.signInWithOAuth({
      provider: providerName,
      options: opts
    });
    if (error) {
      alert('로그인 중 문제가 발생했습니다: ' + error.message);
    }
  }

  // 로그인 후 돌아왔을 때: 협력 신청 폼으로 자동 이동 + 정보 자동입력
  async function checkSession() {
    const { data } = await sb.auth.getSession();
    if (!data.session) return;

    const user = data.session.user;
    const name = user.user_metadata?.full_name || user.user_metadata?.name || '';
    const email = user.email || '';
    const provider = user.app_metadata?.provider || '';
    const providerLabel = provider === 'kakao' ? '카카오' : provider === 'google' ? '구글' : provider;

    loggedInProvider = providerLabel;
    loggedInEmail = email;

    // 신청서에 이름 자동 채움 (이메일은 연락처가 아니므로 폼 채움엔 사용하지 않음)
    if (name) document.getElementById('ap-name').value = name;

    const statusHtml = `
      <div class="login-status">
        <span>${providerLabel ? providerLabel + ' 계정으로 로그인됨' : '로그인됨'} ${name ? '· ' + name + '님' : ''} ${email ? '(' + email + ')' : ''}</span>
        <button type="button" onclick="logout()">로그아웃</button>
      </div>`;

    document.getElementById('apply-login-status').innerHTML = statusHtml;

    // 처음 로그인한 협력사라면(신청 이력 확인 전 단계) 곧바로 신청서 작성으로 안내
    showPanel('apply');
  }

  async function logout() {
    await sb.auth.signOut();
    location.reload();
  }

  async function submitApplication() {
    const company = document.getElementById('ap-company').value.trim();
    const name = document.getElementById('ap-name').value.trim();
    const phone = document.getElementById('ap-phone').value.trim();
    const category = document.getElementById('ap-category').value;
    const intro = document.getElementById('ap-intro').value.trim();

    if (!company || !name || !phone || !category) {
      alert('업체명, 담당자 이름, 연락처, 협력 분야를 입력해주세요.');
      return;
    }

    const btn = document.getElementById('ap-submit-btn');
    btn.disabled = true;
    btn.textContent = '제출 중...';

    try {
      await fetch(SHEET_WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          type: 'partner',
          company, name, phone, category, intro,
          loginProvider: loggedInProvider,
          email: loggedInEmail
        })
      });
      alert('신청이 접수되었습니다. 빠르게 연락드릴게요!');
      btn.textContent = '신청서 제출';
      btn.disabled = false;
      document.getElementById('ap-company').value = '';
      document.getElementById('ap-phone').value = '';
      document.getElementById('ap-category').value = '';
      document.getElementById('ap-intro').value = '';
    } catch (err) {
      alert('제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
      btn.textContent = '신청서 제출';
      btn.disabled = false;
    }
  }

  checkSession();
</script>
</body>
</html>
