<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여는날 — 협력사 센터</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  :root {
    --ink:#1a1610; --paper:#faf8f4; --cream:#f2ede4;
    --gold:#c8a96e; --gold-light:#e8d5a8; --muted:#8a7d6a;
    --line:#e0d8cc; --white:#ffffff;
    --green:#27ae60; --red:#c0392b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh;}

  header{background:var(--ink);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Noto Serif KR',serif;font-size:20px;color:var(--gold);letter-spacing:.08em;text-decoration:none;}
  .home-link{color:var(--muted);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px;}
  .home-link:hover{color:var(--gold);}

  main{max-width:480px;margin:0 auto;padding:48px 24px 80px;}

  /* TABS */
  .tabs{display:flex;gap:0;margin-bottom:32px;border-bottom:1px solid var(--line);}
  .tab-btn{flex:1;text-align:center;padding:14px 0;font-size:14px;color:var(--muted);
    border-bottom:2px solid transparent;cursor:pointer;background:none;
    border-top:none;border-left:none;border-right:none;font-family:'Noto Sans KR',sans-serif;}
  .tab-btn.active{color:var(--ink);border-bottom-color:var(--gold);font-weight:500;}
  .panel{display:none;}
  .panel.active{display:block;animation:fadeUp .25s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* FORM */
  .page-title{font-family:'Noto Serif KR',serif;font-size:24px;margin-bottom:8px;}
  .page-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.7;}
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.05em;}
  .form-group label .req{color:var(--gold);margin-left:2px;}
  .form-group input,.form-group select,.form-group textarea{
    width:100%;border:1.5px solid var(--line);border-radius:8px;padding:12px 14px;
    font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:300;
    background:var(--white);color:var(--ink);outline:none;transition:border-color .15s;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
  .form-group textarea{resize:none;height:80px;}
  .kakao-hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.6;}
  .btn-submit{width:100%;background:var(--gold);color:var(--white);border:none;border-radius:8px;
    padding:14px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;
    font-family:'Noto Sans KR',sans-serif;transition:background .2s;}
  .btn-submit:hover{background:#b8945a;}
  .notice-box{background:var(--cream);border-radius:10px;padding:14px 16px;
    font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:24px;}
  .notice-box strong{color:var(--ink);font-weight:500;}

  /* PROJECT CARDS */
  .project-card{background:var(--white);border:1.5px solid var(--line);border-radius:12px;
    padding:20px;margin-bottom:12px;transition:border-color .2s;}
  .project-card:hover{border-color:var(--gold-light);}
  .project-card.closed{opacity:.55;}
  .pc-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:400;margin-bottom:8px;}
  .pc-meta{font-size:12px;color:var(--muted);line-height:1.9;}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:10px;}
  .badge-open{background:rgba(39,174,96,.12);color:var(--green);}
  .badge-closed{background:var(--cream);color:var(--muted);}
  .btn-respond{display:inline-block;background:var(--gold);color:var(--white);border:none;
    border-radius:6px;padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;margin-top:12px;}
  .btn-respond:hover{background:#b8945a;}
  .btn-responded{background:var(--cream);color:var(--muted);border:1px solid var(--line);
    border-radius:6px;padding:8px 18px;font-size:13px;cursor:default;
    font-family:'Noto Sans KR',sans-serif;margin-top:12px;}
  .empty-state{text-align:center;padding:40px 0;color:var(--muted);font-size:14px;line-height:1.8;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
    display:flex;align-items:center;justify-content:center;padding:16px;}
  .modal-box{background:var(--white);border-radius:12px;padding:28px 24px;max-width:420px;width:100%;}
  .modal-title{font-family:'Noto Serif KR',serif;font-size:18px;margin-bottom:6px;}
  .modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
  .participate-btns{display:flex;gap:10px;margin-bottom:16px;}
  .pbtn{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;
    border:1.5px solid var(--line);background:var(--white);font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
  .pbtn.yes.selected{background:rgba(39,174,96,.1);border-color:var(--green);color:var(--green);}
  .pbtn.no.selected{background:rgba(192,57,43,.08);border-color:var(--red);color:var(--red);}
  .pbtn:hover{border-color:var(--gold);}
  .modal-form-group{margin-bottom:14px;}
  .modal-form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .modal-form-group input,.modal-form-group textarea{
    width:100%;border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;
    font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;}
  .modal-form-group input:focus,.modal-form-group textarea:focus{border-color:var(--gold);}
  .modal-form-group textarea{resize:none;height:72px;}
  .modal-btns{display:flex;gap:10px;margin-top:4px;}
  .modal-btn-submit{flex:1;background:var(--gold);color:var(--white);border:none;border-radius:8px;
    padding:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
  .modal-btn-cancel{flex:0 0 72px;background:var(--cream);color:var(--muted);border:none;
    border-radius:8px;padding:12px;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">여는날</a>
  <a href="index.html" class="home-link">← 홈으로</a>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" id="tab-apply" onclick="showPanel('apply')">협력 신청</button>
    <button class="tab-btn" id="tab-projects" onclick="showPanel('projects')">📋 공고 현황</button>
  </div>

  <!-- 협력 신청 -->
  <div class="panel active" id="panel-apply">
    <div class="page-title">협력 신청</div>
    <div class="page-sub">플로리스트, 스냅·영상, 헤어메이크업, 푸드트럭, 답례품 등<br>여는날과 함께할 협력사를 찾고 있어요</div>

    <div class="notice-box">
      <strong>안내</strong><br>
      신청서 검토 후 영업일 기준 2~3일 내 카카오톡으로 연락드려요.<br>
      승인된 협력사에게는 새 행사 공고를 카카오톡으로 먼저 알려드립니다.
    </div>

    <div class="form-group">
      <label>업체명 <span class="req">*</span></label>
      <input type="text" id="ap-company" placeholder="업체명을 입력해주세요">
    </div>
    <div class="form-group">
      <label>담당자 이름 <span class="req">*</span></label>
      <input type="text" id="ap-name" placeholder="이름을 입력해주세요">
    </div>
    <div class="form-group">
      <label>연락처 <span class="req">*</span></label>
      <input type="tel" id="ap-phone" placeholder="010-0000-0000">
    </div>
    <div class="form-group">
      <label>카카오톡 ID <span class="req">*</span></label>
      <input type="text" id="ap-kakao" placeholder="카카오톡 검색용 아이디">
      <p class="kakao-hint">💬 승인 후 공고 알림 및 소통은 카카오톡으로 진행됩니다.<br>카카오톡 앱 → 더보기 → 설정 → 카카오계정에서 확인하실 수 있어요.</p>
    </div>
    <div class="form-group">
      <label>협력 분야 <span class="req">*</span></label>
      <select id="ap-category">
        <option value="">선택해주세요</option>
        <option>플로리스트 · 꽃장식</option>
        <option>스냅 · 영상 촬영</option>
        <option>헤어 · 메이크업</option>
        <option>푸드트럭 · 음료바</option>
        <option>답례품</option>
        <option>버스킹 · 음악</option>
        <option>기타</option>
      </select>
    </div>
    <div class="form-group">
      <label>소개 / 포트폴리오 링크 (선택)</label>
      <textarea id="ap-intro" placeholder="간단한 소개나 인스타그램, 포트폴리오 링크를 남겨주세요"></textarea>
    </div>
    <label style="display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--muted);margin-bottom:16px;cursor:pointer;">
      <input type="checkbox" id="ap-consent" style="margin-top:2px;flex-shrink:0;">
      <span><a href="privacy.html" target="_blank" style="color:var(--ink);text-decoration:underline;">개인정보 수집·이용</a>에 동의합니다 (필수)</span>
    </label>
    <button class="btn-submit" id="ap-submit-btn" onclick="submitApplication()">신청서 제출</button>
  </div>

  <!-- 공고 현황 -->
  <div class="panel" id="panel-projects">
    <div class="page-title">공고 현황</div>
    <div class="page-sub">현재 모집 중인 프로젝트를 확인하고 참여 여부를 알려주세요</div>
    <div id="project-list"><div class="empty-state">불러오는 중...</div></div>
  </div>
</main>

<!-- 참여 신청 모달 -->
<div class="modal-overlay" id="respond-modal" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="modal-project-title"></div>
    <div class="modal-sub" id="modal-project-meta"></div>

    <div class="participate-btns">
      <button class="pbtn yes" id="pbtn-yes" onclick="selectParticipate('참여')">✅ 참여하겠습니다</button>
      <button class="pbtn no" id="pbtn-no" onclick="selectParticipate('불참')">❌ 이번엔 어렵습니다</button>
    </div>

    <div id="price-section">
      <div class="modal-form-group">
        <label>업체명 *</label>
        <input type="text" id="resp-company" placeholder="업체명">
      </div>
      <div class="modal-form-group">
        <label>카카오톡 ID *</label>
        <input type="text" id="resp-kakao" placeholder="카카오톡 검색용 아이디">
      </div>
      <div class="modal-form-group">
        <label>견적 금액 (원, 선택)</label>
        <input type="number" id="resp-price" placeholder="예: 350000">
      </div>
      <div class="modal-form-group">
        <label>메모 (선택)</label>
        <textarea id="resp-memo" placeholder="준비 가능한 내용, 포함/불포함 항목, 조건 등"></textarea>
      </div>
    </div>

    <div class="modal-btns">
      <button class="modal-btn-submit" id="resp-submit-btn" onclick="submitResponse()">제출하기</button>
      <button class="modal-btn-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<script>
  const WEBHOOK = 'https://script.google.com/macros/s/AKfycbzG1GPR8OhMIeBeTFvt7gE5CGiyQx3ggnLiVIah9geT89m-_poYFEwmi9K--NZ0HxDKjg/exec';

  // ── 탭 전환 ──
  function showPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'projects') loadProjects();
  }

  // ── 협력 신청 ──
  async function submitApplication() {
    const company  = document.getElementById('ap-company').value.trim();
    const name     = document.getElementById('ap-name').value.trim();
    const phone    = document.getElementById('ap-phone').value.trim();
    const kakao    = document.getElementById('ap-kakao').value.trim();
    const category = document.getElementById('ap-category').value;
    const intro    = document.getElementById('ap-intro').value.trim();

    if (!company || !name || !phone || !kakao || !category) {
      alert('업체명, 담당자 이름, 연락처, 카카오톡 ID, 협력 분야는 필수입니다.');
      return;
    }
    if (!document.getElementById('ap-consent').checked) {
      alert('개인정보 수집·이용에 동의해주셔야 신청이 가능합니다.');
      return;
    }

    const btn = document.getElementById('ap-submit-btn');
    btn.disabled = true;
    btn.textContent = '중복 확인 중...';

    try {
      // 중복 체크
      const checkRes = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ type: 'check', phone })
      });
      const checkData = await checkRes.json();
      if (checkData.duplicate) {
        alert('이미 신청 이력이 있는 업체입니다.\n추가 문의는 카카오채널 @여는날로 연락주세요.');
        btn.textContent = '신청서 제출';
        btn.disabled = false;
        return;
      }

      // 제출
      btn.textContent = '제출 중...';
      await fetch(WEBHOOK, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ type: 'partner', company, name, phone, kakaoId: kakao, category, intro })
      });
      alert('신청이 접수되었습니다.\n검토 후 카카오톡으로 연락드릴게요!');
      btn.textContent = '신청서 제출';
      btn.disabled = false;
      ['ap-company','ap-name','ap-phone','ap-kakao','ap-category','ap-intro'].forEach(id => {
        const el = document.getElementById(id);
        el.value = '';
      });
      document.getElementById('ap-consent').checked = false;
    } catch(err) {
      alert('제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
      btn.textContent = '신청서 제출';
      btn.disabled = false;
    }
  }

  // ── 공고 목록 ──
  let projectMap = {};
  let respondedIds = JSON.parse(localStorage.getItem('yeonunnal_responded') || '[]');

  async function loadProjects() {
    const el = document.getElementById('project-list');
    el.innerHTML = '<div class="empty-state">불러오는 중...</div>';
    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ type: 'get_projects' })
      });
      const data = await res.json();
      const projects = (data.projects || []).filter(p => p.id);
      projectMap = {};
      projects.forEach(p => { projectMap[p.id] = p; });

      if (projects.length === 0) {
        el.innerHTML = '<div class="empty-state">현재 모집 중인 공고가 없습니다<br><span style="font-size:12px;">새 공고는 카카오톡으로 알림을 드려요</span></div>';
        return;
      }
      el.innerHTML = '';
      projects.slice().reverse().forEach(p => {
        const isOpen = p.status === '모집중';
        const responded = respondedIds.includes(p.id);
        el.innerHTML += `
          <div class="project-card ${isOpen ? '' : 'closed'}">
            <span class="badge ${isOpen ? 'badge-open' : 'badge-closed'}">${p.status}</span>
            <div class="pc-title">${p.title}</div>
            <div class="pc-meta">
              📅 행사일: ${p.eventDate} &nbsp;·&nbsp; 📍 장소: ${p.location}<br>
              🔧 필요 분야: ${p.categories}<br>
              ⏰ 지원 마감: ${p.deadline}
              ${p.detail ? `<br><br>${p.detail}` : ''}
            </div>
            ${isOpen
              ? (responded
                  ? `<button class="btn-responded">✓ 이미 응답하셨습니다</button>`
                  : `<button class="btn-respond" data-pid="${p.id}" onclick="openModalById(this.dataset.pid)">참여 여부 알리기</button>`)
              : ''}
          </div>`;
      });
    } catch(e) {
      el.innerHTML = '<div class="empty-state">불러오기 실패. 잠시 후 다시 시도해주세요.</div>';
    }
  }

  // ── 모달 ──
  let currentProject = null;
  let selectedParticipate = '';

  function openModalById(pid) {
    const p = projectMap[pid];
    if (!p) return;
    openModal(p);
  }

  function openModal(p) {
    currentProject = p;
    selectedParticipate = '';
    document.getElementById('modal-project-title').textContent = p.title;
    document.getElementById('modal-project-meta').textContent = `${p.eventDate} · ${p.location} · 마감 ${p.deadline}`;
    document.getElementById('resp-company').value = '';
    document.getElementById('resp-kakao').value = '';
    document.getElementById('resp-price').value = '';
    document.getElementById('resp-memo').value = '';
    document.getElementById('pbtn-yes').classList.remove('selected');
    document.getElementById('pbtn-no').classList.remove('selected');
    document.getElementById('price-section').style.display = 'block';
    document.getElementById('respond-modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('respond-modal').style.display = 'none';
    currentProject = null;
    selectedParticipate = '';
  }

  function selectParticipate(val) {
    selectedParticipate = val;
    document.getElementById('pbtn-yes').classList.toggle('selected', val === '참여');
    document.getElementById('pbtn-no').classList.toggle('selected', val === '불참');
    document.getElementById('price-section').style.display = val === '참여' ? 'block' : 'none';
  }

  async function submitResponse() {
    if (!selectedParticipate) { alert('참여 여부를 선택해주세요.'); return; }
    const company = document.getElementById('resp-company').value.trim();
    const kakao   = document.getElementById('resp-kakao').value.trim();
    if (selectedParticipate === '참여' && (!company || !kakao)) {
      alert('업체명과 카카오톡 ID를 입력해주세요.'); return;
    }
    if (!currentProject) return;

    const btn = document.getElementById('resp-submit-btn');
    btn.disabled = true; btn.textContent = '제출 중...';

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          type: 'submit_response',
          projectId: currentProject.id,
          projectTitle: currentProject.title,
          company,
          name: company,
          phone: '',
          email: '',
          participate: selectedParticipate,
          price: document.getElementById('resp-price').value,
          memo: document.getElementById('resp-memo').value,
          userId: kakao
        })
      });
      const data = await res.json();
      if (data.duplicate) {
        alert('이미 이 공고에 응답하셨습니다.');
      } else {
        respondedIds.push(currentProject.id);
        localStorage.setItem('yeonunnal_responded', JSON.stringify(respondedIds));
        alert('응답이 접수되었습니다. 감사합니다!');
        closeModal();
        loadProjects();
      }
    } catch(e) {
      alert('제출 실패. 다시 시도해주세요.');
    }
    btn.disabled = false; btn.textContent = '제출하기';
  }
</script>
</body>
</html>
